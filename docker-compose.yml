services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: new_project_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./new_project
    container_name: django_backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://postgres:root@db:5432/new_project_db
      - SECRET_KEY=django-insecure-vg^-0^%ae_!+n+#do8(+o#93ep36joi67osom%mekbw!ynw*3%
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@test.com}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-Admin123456!}
      - DEFAULT_ADMIN_NAME=${DEFAULT_ADMIN_NAME:-Admin}
      - DEFAULT_ADMIN_PATERNAL_SURNAME=${DEFAULT_ADMIN_PATERNAL_SURNAME:-Root}
      - DEFAULT_ADMIN_MATERNAL_SURNAME=${DEFAULT_ADMIN_MATERNAL_SURNAME:-Seed}
      - DEFAULT_ADMIN_UNIVERSITY=${DEFAULT_ADMIN_UNIVERSITY:-LMS}
      - DEFAULT_ADMIN_COUNTRY=${DEFAULT_ADMIN_COUNTRY:-Bolivia}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./new_project/media:/app/media
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./new_project/media:/app/media:ro
    restart: unless-stopped

  notifications_worker:
    build: ./new_project
    container_name: notifications_worker
    command: sh -c "python manage.py migrate && while true; do python manage.py process_automatic_notifications --enrollment-days-before 7 --installment-days-before 3; sleep 3600; done"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://postgres:root@db:5432/new_project_db
      - SECRET_KEY=django-insecure-vg^-0^%ae_!+n+#do8(+o#93ep36joi67osom%mekbw!ynw*3%
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@test.com}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-Admin123456!}
      - DEFAULT_ADMIN_NAME=${DEFAULT_ADMIN_NAME:-Admin}
      - DEFAULT_ADMIN_PATERNAL_SURNAME=${DEFAULT_ADMIN_PATERNAL_SURNAME:-Root}
      - DEFAULT_ADMIN_MATERNAL_SURNAME=${DEFAULT_ADMIN_MATERNAL_SURNAME:-Seed}
      - DEFAULT_ADMIN_UNIVERSITY=${DEFAULT_ADMIN_UNIVERSITY:-LMS}
      - DEFAULT_ADMIN_COUNTRY=${DEFAULT_ADMIN_COUNTRY:-Bolivia}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./new_project/media:/app/media
    restart: unless-stopped

volumes:
  postgres_data:
