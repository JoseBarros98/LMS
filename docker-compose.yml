services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: new_project_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./new_project
    container_name: django_backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://postgres:root@db:5432/new_project_db
      - SECRET_KEY=django-insecure-vg^-0^%ae_!+n+#do8(+o#93ep36joi67osom%mekbw!ynw*3%
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./new_project/media:/app/media
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./new_project/media:/app/media:ro
    restart: unless-stopped

volumes:
  postgres_data:
